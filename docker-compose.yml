services:

  postgres:
    image: postgres:17-alpine
    container_name: queueforge-postgres
    environment:
      POSTGRES_DB: queueforge
      POSTGRES_USER: queueuser
      POSTGRES_PASSWORD: queuepass
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queueuser -d queueforge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: queueforge-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: queueforge-app
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: postgres://queueuser:queuepass@postgres:5432/queueforge?sslmode=disable
      REDIS_URL: redis://redis:6379
      WORKER_COUNT: 5
      MAX_RETRIES: 3
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    container_name: queueforge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: queueforge-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  grafana-data: